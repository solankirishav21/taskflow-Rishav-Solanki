version: "3.9"

services:
  db:
    image: postgres:16
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  test:
    build: .
    command: pytest
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskflow
      SECRET_KEY: testsecret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_HOURS: 24
      APP_NAME: TaskFlow API
      DEBUG: "True"
  backend:
    build: .
    container_name: taskflow_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskflow
      SECRET_KEY: secretkey
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_HOURS: 24
      APP_NAME: TaskFlow API
      DEBUG: "True"
    volumes:
      - .:/app
    command: >
      sh -c "
      sleep 5 &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data: